<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkySpace - Sign In / Sign Up</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --sky-blue-light: #8ecae6ff;
            --blue-green: #219ebcff;
            --deep-space-blue: #023047ff;
            --amber-flame: #ffb703ff;
            --princeton-orange: #fb8500ff;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--deep-space-blue) 0%, var(--blue-green) 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Animated background */
        .bg-animation {
            position: absolute;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .floating-shape {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .shape1 {
            width: 120px;
            height: 120px;
            left: 10%;
            top: 20%;
            animation-delay: 0s;
        }

        .shape2 {
            width: 80px;
            height: 80px;
            right: 15%;
            top: 60%;
            animation-delay: 5s;
        }

        .shape3 {
            width: 60px;
            height: 60px;
            left: 70%;
            bottom: 20%;
            animation-delay: 10s;
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.3;
            }
            50% {
                transform: translateY(-30px) rotate(180deg);
                opacity: 0.1;
            }
        }

        /* Main container - adjusted height for Sign Up */
        .container {
            width: 900px;
            height: 620px; /* Increased from 550px to 620px */
            background: white;
            border-radius: 16px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.2);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: slideIn 0.6s ease-out;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Forms container */
        .forms-container {
            display: flex;
            height: 100%;
            position: relative;
        }

        /* Form panels */
        .form-panel {
            flex: 1;
            padding: 30px 40px; /* Reduced from 35px to 30px */
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            transition: all 0.6s ease;
        }

        .sign-in-panel {
            background: white;
            z-index: 2;
        }

        .sign-up-panel {
            background: white;
            z-index: 1;
        }

        /* Form content */
        .form-content {
            animation: fadeIn 0.8s ease-out;
            width: 100%;
            max-width: 350px;
            margin: 0 auto;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateX(20px);
            }
            to {
                opacity: 1;
                transform: translateX(0);
            }
        }

        /* Logo */
        .logo {
            width: 45px; /* Reduced from 50px */
            height: 45px;
            background: linear-gradient(135deg, var(--blue-green), var(--sky-blue-light));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 15px; /* Reduced from 20px */
            animation: logoPulse 2s infinite;
        }

        @keyframes logoPulse {
            0% {
                box-shadow: 0 0 0 0 rgba(33, 158, 188, 0.4);
            }
            70% {
                box-shadow: 0 0 0 15px rgba(33, 158, 188, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(33, 158, 188, 0);
            }
        }

        .logo i {
            font-size: 18px; /* Reduced from 20px */
            color: white;
        }

        /* Form titles */
        .form-title {
            color: var(--deep-space-blue);
            font-size: 26px; /* Reduced from 28px */
            font-weight: 600;
            margin-bottom: 6px; /* Reduced from 8px */
        }

        .form-subtitle {
            color: #6b7280;
            font-size: 13px; /* Reduced from 14px */
            margin-bottom: 20px; /* Reduced from 25px */
        }

        /* Form groups */
        .form-group {
            margin-bottom: 14px; /* Reduced from 16px */
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 5px; /* Reduced from 6px */
            color: var(--deep-space-blue);
            font-size: 12px; /* Reduced from 13px */
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 10px 12px; /* Reduced from 12px 14px */
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.3s ease;
            background: #f9fafb;
        }

        .form-group input::placeholder {
            color: #9ca3af;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--blue-green);
            background: white;
            box-shadow: 0 0 0 3px rgba(33, 158, 188, 0.1);
        }

        .input-icon {
            position: absolute;
            right: 12px;
            top: 31px; /* Adjusted for reduced padding */
            color: #9ca3af;
            transition: color 0.3s ease;
            font-size: 13px; /* Reduced from 14px */
        }

        .form-group input:focus + .input-icon {
            color: var(--blue-green);
        }

        /* Form options */
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px; /* Reduced from 20px */
        }

        .remember-me {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .remember-me input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: var(--blue-green);
            cursor: pointer;
        }

        .remember-me label {
            color: var(--deep-space-blue);
            font-size: 12px; /* Reduced from 13px */
            cursor: pointer;
            user-select: none;
        }

        .forgot-password {
            color: var(--blue-green);
            text-decoration: none;
            font-size: 12px; /* Reduced from 13px */
            transition: all 0.3s ease;
        }

        .forgot-password:hover {
            color: var(--deep-space-blue);
            text-decoration: underline;
        }

        /* Submit button */
        .submit-btn {
            width: 100%;
            padding: 11px; /* Reduced from 12px */
            background: var(--blue-green);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 14px; /* Reduced from 15px */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
            margin-bottom: 15px; /* Reduced from 18px */
        }

        .submit-btn::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .submit-btn:hover::before {
            width: 300px;
            height: 300px;
        }

        .submit-btn:hover {
            background: var(--deep-space-blue);
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(3, 48, 71, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        /* Divider */
        .divider {
            text-align: center;
            margin: 15px 0; /* Reduced from 18px */
            position: relative;
        }

        .divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: #e5e7eb;
        }

        .divider span {
            background: white;
            padding: 0 12px;
            color: #6b7280;
            font-size: 11px; /* Reduced from 12px */
            position: relative;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Social buttons */
        .social-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 10px; /* Reduced from 15px */
        }

        .social-btn {
            flex: 1;
            padding: 9px; /* Reduced from 10px */
            border: 2px solid #e5e7eb;
            background: white;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            font-size: 12px; /* Reduced from 13px */
            color: #374151;
            text-decoration: none;
        }

        .social-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .social-btn.google:hover {
            border-color: #ea4335;
            background: #fef2f2;
        }

        .social-btn.linkedin:hover {
            border-color: #0077b5;
            background: #f0f9ff;
        }

        .social-btn.microsoft:hover {
            border-color: #00a4ef;
            background: #f0f9ff;
        }

        .social-btn i {
            font-size: 15px; /* Reduced from 16px */
        }

        /* Panel overlay */
        .panel-overlay {
            position: absolute;
            top: 0;
            left: 50%;
            width: 50%;
            height: 100%;
            background: linear-gradient(135deg, var(--deep-space-blue), var(--blue-green));
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 40px;
            color: white;
            transition: all 0.6s ease;
            z-index: 3;
        }

        .panel-overlay.move-left {
            transform: translateX(-100%);
        }

        .overlay-content {
            text-align: center;
            max-width: 300px;
        }

        .overlay-content h2 {
            font-size: 30px; /* Reduced from 32px */
            margin-bottom: 10px; /* Reduced from 12px */
        }

        .overlay-content p {
            font-size: 13px; /* Reduced from 14px */
            margin-bottom: 22px; /* Reduced from 25px */
            opacity: 0.9;
            line-height: 1.4;
        }

        .switch-btn {
            padding: 11px 32px; /* Reduced from 12px 35px */
            background: transparent;
            color: white;
            border: 2px solid white;
            border-radius: 8px;
            font-size: 14px; /* Reduced from 15px */
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .switch-btn:hover {
            background: white;
            color: var(--deep-space-blue);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(255, 255, 255, 0.3);
        }

        /* Success toast */
        .success-toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: white;
            padding: 14px 18px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateX(400px);
            transition: transform 0.3s ease;
            z-index: 1000;
        }

        .success-toast.show {
            transform: translateX(0);
        }

        .success-toast i {
            color: #10b981;
            font-size: 18px;
        }

        /* Hidden class */
        .hidden {
            display: none !important;
        }

        /* Tablet Responsive */
        @media (max-width: 992px) {
            .container {
                width: 95%;
                max-width: 800px;
                height: 580px; /* Adjusted for tablet */
            }
            
            .form-panel {
                padding: 25px 20px;
            }
            
            .form-title {
                font-size: 24px;
            }
            
            .overlay-content h2 {
                font-size: 28px;
            }
        }

        /* Mobile Responsive */
        @media (max-width: 768px) {
            body {
                padding: 10px;
            }
            
            .container {
                width: 100%;
                max-width: 400px;
                height: auto;
                min-height: 520px; /* Reduced for mobile */
            }
            
            .forms-container {
                flex-direction: column;
            }
            
            .form-panel {
                padding: 20px 18px;
                width: 100%;
            }
            
            .form-content {
                max-width: 100%;
            }
            
            .panel-overlay {
                display: none;
            }
            
            .social-buttons {
                flex-direction: column;
            }
            
            .social-btn {
                width: 100%;
            }
            
            .success-toast {
                right: 10px;
                left: 10px;
                transform: translateY(-100px);
            }
            
            .success-toast.show {
                transform: translateY(0);
            }
        }

        /* Small Mobile */
        @media (max-width: 480px) {
            .container {
                padding: 8px;
                border-radius: 12px;
            }
            
            .form-panel {
                padding: 18px 15px;
            }
            
            .form-title {
                font-size: 20px;
            }
            
            .form-group input {
                padding: 9px 11px;
            }
            
            .submit-btn {
                padding: 10px;
            }
        }
    </style>
</head>
<body>
    <!-- Animated background -->
    <div class="bg-animation">
        <div class="floating-shape shape1"></div>
        <div class="floating-shape shape2"></div>
        <div class="floating-shape shape3"></div>
    </div>

    <!-- Main container -->
    <div class="container">
        <div class="forms-container">
            <!-- Sign In Panel -->
            <div class="form-panel sign-in-panel">
                <div class="form-content" id="signInContent">
                    <div class="logo">
                        <i class="fas fa-cloud"></i>
                    </div>
                    <h1 class="form-title">Sign In</h1>
                    <p class="form-subtitle">Welcome back! Please sign in to continue</p>
                    
                    <form id="signInForm">
                        <div class="form-group">
                            <label for="signInEmail">Email Address</label>
                            <input type="email" id="signInEmail" placeholder="Enter your email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>

                        <div class="form-group">
                            <label for="signInPassword">Password</label>
                            <input type="password" id="signInPassword" placeholder="Enter your password" required>
                            <i class="fas fa-lock input-icon"></i>
                        </div>

                        <div class="form-options">
                            <div class="remember-me">
                                <input type="checkbox" id="rememberMe">
                                <label for="rememberMe">Remember me</label>
                            </div>
                            <a href="#" class="forgot-password">Forgot Password?</a>
                        </div>

                        <button type="submit" class="submit-btn">Sign In</button>
                    </form>

                    <div class="divider">
                        <span>Or continue with</span>
                    </div>

                    <div class="social-buttons">
                        <a href="#" class="social-btn google" data-provider="google">
                            <i class="fab fa-google"></i>
                            <span>Google</span>
                        </a>
                        <a href="#" class="social-btn linkedin" data-provider="linkedin">
                            <i class="fab fa-linkedin-in"></i>
                            <span>LinkedIn</span>
                        </a>
                        <a href="#" class="social-btn microsoft" data-provider="microsoft">
                            <i class="fab fa-microsoft"></i>
                            <span>Microsoft</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Sign Up Panel -->
            <div class="form-panel sign-up-panel">
                <div class="form-content hidden" id="signUpContent">
                    <div class="logo">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1 class="form-title">Sign Up</h1>
                    <p class="form-subtitle">Create your account and get started</p>
                    
                    <form id="signUpForm">
                        <div class="form-group">
                            <label for="signUpName">Full Name</label>
                            <input type="text" id="signUpName" placeholder="Enter your full name" required>
                            <i class="fas fa-user input-icon"></i>
                        </div>

                        <div class="form-group">
                            <label for="signUpEmail">Email Address</label>
                            <input type="email" id="signUpEmail" placeholder="Enter your email" required>
                            <i class="fas fa-envelope input-icon"></i>
                        </div>

                        <div class="form-group">
                            <label for="signUpPassword">Password</label>
                            <input type="password" id="signUpPassword" placeholder="Create a password" required>
                            <i class="fas fa-lock input-icon"></i>
                        </div>

                        <div class="form-group">
                            <label for="confirmPassword">Confirm Password</label>
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" required>
                            <i class="fas fa-lock input-icon"></i>
                        </div>

                        <button type="submit" class="submit-btn">Sign Up</button>
                    </form>

                    <div class="divider">
                        <span>Or sign up with</span>
                    </div>

                    <div class="social-buttons">
                        <a href="#" class="social-btn google" data-provider="google">
                            <i class="fab fa-google"></i>
                            <span>Google</span>
                        </a>
                        <a href="#" class="social-btn linkedin" data-provider="linkedin">
                            <i class="fab fa-linkedin-in"></i>
                            <span>LinkedIn</span>
                        </a>
                        <a href="#" class="social-btn microsoft" data-provider="microsoft">
                            <i class="fab fa-microsoft"></i>
                            <span>Microsoft</span>
                        </a>
                    </div>
                </div>
            </div>

            <!-- Overlay Panel -->
            <div class="panel-overlay" id="overlayPanel">
                <div class="overlay-content">
                    <h2 id="overlayTitle">Hello, Friend!</h2>
                    <p id="overlayText">Enter your personal details and start your journey with us</p>
                    <button class="switch-btn" id="switchBtn" onclick="toggleForm()">Sign Up</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Success Toast -->
    <div class="success-toast" id="successToast">
        <i class="fas fa-check-circle"></i>
        <span id="toastMessage">Success!</span>
    </div>

    <script>
        // DOM elements
        const signInForm = document.getElementById('signInForm');
        const signUpForm = document.getElementById('signUpForm');
        const signInContent = document.getElementById('signInContent');
        const signUpContent = document.getElementById('signUpContent');
        const overlayPanel = document.getElementById('overlayPanel');
        const overlayTitle = document.getElementById('overlayTitle');
        const overlayText = document.getElementById('overlayText');
        const successToast = document.getElementById('successToast');
        const toastMessage = document.getElementById('toastMessage');

        let isSignIn = true;

        // Switch to Sign Up
        function showSignUp() {
            isSignIn = false;
            signInContent.classList.add('hidden');
            signUpContent.classList.remove('hidden');
            
            // Update overlay
            if (window.innerWidth > 768) {
                overlayPanel.classList.add('move-left');
                overlayTitle.textContent = 'Welcome Back!';
                overlayText.textContent = 'To keep connected with us, please login with your personal info';
                document.getElementById('switchBtn').textContent = 'Sign In';
            }
        }

        // Switch to Sign In
        function showSignIn() {
            isSignIn = true;
            signUpContent.classList.add('hidden');
            signInContent.classList.remove('hidden');
            
            // Update overlay
            if (window.innerWidth > 768) {
                overlayPanel.classList.remove('move-left');
                overlayTitle.textContent = 'Hello, Friend!';
                overlayText.textContent = 'Enter your personal details and start your journey with us';
                document.getElementById('switchBtn').textContent = 'Sign Up';
            }
        }

        // Toggle form
        function toggleForm() {
            if (isSignIn) {
                showSignUp();
            } else {
                showSignIn();
            }
        }

        // Save session and redirect to modules page
        function saveSessionAndRedirect(name, email, remember) {
            const userData = { name: name, email: email, isLoggedIn: true };
            const storage = remember ? localStorage : sessionStorage;
            storage.setItem('caKnowledgeOS_user', JSON.stringify(userData));
            window.location.href = 'modules.html';
        }

        // If already logged in, skip the login page
        (function checkExistingSession() {
            const stored = localStorage.getItem('caKnowledgeOS_user') || sessionStorage.getItem('caKnowledgeOS_user');
            if (stored) {
                try {
                    const user = JSON.parse(stored);
                    if (user && user.isLoggedIn) {
                        window.location.href = 'modules.html';
                    }
                } catch (e) { /* invalid data, stay on login */ }
            }
        })();

        // Sign In form submission
        signInForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = document.getElementById('signInEmail').value;
            const password = document.getElementById('signInPassword').value;
            const remember = document.getElementById('rememberMe').checked;

            if (!email || !password) {
                showToast('Please fill in all fields.');
                return;
            }

            showToast('Signing in...');
            await new Promise(resolve => setTimeout(resolve, 800));

            // Derive a display name from the email (before @)
            const name = email.split('@')[0];
            saveSessionAndRedirect(name, email, remember);
        });

        // Sign Up form submission
        signUpForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const password = document.getElementById('signUpPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;

            if (password !== confirmPassword) {
                showToast('Passwords do not match!');
                return;
            }

            const name = document.getElementById('signUpName').value;
            const email = document.getElementById('signUpEmail').value;

            if (!name || !email || !password) {
                showToast('Please fill in all fields.');
                return;
            }

            showToast('Creating your account...');
            await new Promise(resolve => setTimeout(resolve, 800));

            // After sign-up, log the user in immediately (remember by default)
            saveSessionAndRedirect(name, email, true);
        });

        // Social login handlers
        document.querySelectorAll('.social-btn').forEach(btn => {
            btn.addEventListener('click', async (e) => {
                e.preventDefault();
                const provider = btn.dataset.provider;
                const action = isSignIn ? 'Signing in' : 'Signing up';
                showToast(`${action} with ${provider.charAt(0).toUpperCase() + provider.slice(1)}...`);
                await new Promise(resolve => setTimeout(resolve, 800));
                // Use a generic display name for social logins
                saveSessionAndRedirect(provider.charAt(0).toUpperCase() + provider.slice(1) + ' User', provider + '@social.login', true);
            });
        });

        // Forgot password handler
        document.querySelector('.forgot-password').addEventListener('click', (e) => {
            e.preventDefault();
            showToast('Password reset link sent to your email!');
        });

        // Toast notification function
        function showToast(message) {
            toastMessage.textContent = message;
            successToast.classList.add('show');
            
            setTimeout(() => {
                successToast.classList.remove('show');
            }, 3000);
        }

        // Add ripple effect to buttons
        document.querySelectorAll('.submit-btn, .switch-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                const ripple = document.createElement('span');
                const rect = this.getBoundingClientRect();
                const size = Math.max(rect.width, rect.height);
                const x = e.clientX - rect.left - size / 2;
                const y = e.clientY - rect.top - size / 2;
                
                ripple.style.width = ripple.style.height = size + 'px';
                ripple.style.left = x + 'px';
                ripple.style.top = y + 'px';
                ripple.style.position = 'absolute';
                ripple.style.borderRadius = '50%';
                ripple.style.background = 'rgba(255, 255, 255, 0.5)';
                ripple.style.transform = 'scale(0)';
                ripple.style.animation = 'ripple 0.6s ease-out';
                ripple.style.pointerEvents = 'none';
                
                this.appendChild(ripple);
                
                setTimeout(() => {
                    ripple.remove();
                }, 600);
            });
        });

        // Add ripple animation
        const style = document.createElement('style');
        style.textContent = `
            @keyframes ripple {
                to {
                    transform: scale(4);
                    opacity: 0;
                }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
